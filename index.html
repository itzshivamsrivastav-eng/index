<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Search</title>
    <style>

        
.wr{
    text-align: center;
    color: red;
    border: 3px inset green;
    padding: 10px 20px;
    border-radius: 10px;
    margin: 15px 0;
}

.para{
    font-size: 20px;
    padding: 5px 10px;
    border: 3px inset yellow;
    border-radius: 10px;
    color: blue;
    font-family: Arial, sans-serif;
}

body{
    background-image: url('searchbarpage.png');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    min-height: 100vh;
}

h1{
    font-size: 28px;
    border: 3px inset green;
    border-radius: 20px;
    padding: 10px 20px;
    width: fit-content;
    max-width: 90%;
    text-align: center;
    color: red;
    margin: 250px auto 0;
}

.search{
    display: block;
    margin: 40px auto;
    padding: 10px;
    width: 90%;
    max-width: 320px;
    border-radius: 10px;
    border: 1px inset green;
}

.btn{
    display: block;
    background-color: rgba(255,255,255,0.5);
    border-radius: 20px;
    padding: 8px 20px;
    color: brown;
    font-size: 20px;
    margin: 20px auto;
}

.overlay{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.recipe-card{
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    background-image: url('background.png');
    background-size: cover;
    background-position: center;
    padding: 20px;
    border-radius: 20px;
    overflow-y: auto;
}

.hidden{
    display:none;
}

.error{
    color:red;
}

footer{
    font-size: 20px;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 20px;
    background-color: rgba(0,0,0,0.7);
    color: white;
}

.spinner{
    width:28px;
    height:28px;
    border:3px solid #ddd;
    border-top-color:orange;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:auto;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@media (max-width: 768px){

    h1{
        margin-left: 20px;
        margin-right: 20px;
        margin-top: 180px;
        font-size: 22px;
    }

    .search{
        width: 90%;
        max-width: 320px;
    }

    .btn{
        display: block;
        margin: 20px auto;
        font-size: 18px;
    }

    .recipe-card{
        width: 95%;
        height: auto;
        max-height: 80vh;
        overflow-y: auto;
        padding: 15px;
    }

    .wr{
        margin-left: 10px;
        margin-right: 10px;
        font-size: 18px;
    }

    .para{
        font-size: 16px;
    }

    footer{
        font-size: 14px;
        padding: 15px;
    }
}
    </style>
</head>
<body>
    <h1>Search For Your Recipes</h1>
    <input type="text" class = "search" id="searchInput" placeholder="Enter recipe name...">
    <button class = "btn" id="searchButton">Search</button>
    <div class="overlay hidden" id="overlay">
        <div class="recipe-card">
            <button id="closeBtn">❌</button>
            <div id="recipe-card"></div>
        </div>
    </div>
    <footer>© 2026 Recipe Founder | Made with ❤️ by Shivam Srivastava™</footer>
    <script>
        const recipeContent = document.getElementById("recipe-card");
        const searchButton = document.getElementById("searchButton");
        const searchInput = document.getElementById("searchInput");
        const overlay = document.getElementById("overlay");
        const closeBtn = document.getElementById("closeBtn");

        closeBtn.addEventListener("click", () => {
                overlay.classList.add("hidden");
        });

        function showRecipe(recipe) {
            recipeContent.innerHTML = `
                <h2 class= "wr">Dish Name : ${recipe.strMeal}</h2>
                <img src="${recipe.strMealThumb}" style="width:250px;display:block;margin:20px auto;border-radius:15px;">
                <h2 class = "wr">Category : ${recipe.strCategory}</h2>
                <h2 class = "wr">Area : ${recipe.strArea}</h2>
                <p class="para">Instructions : ${recipe.strInstructions}</p>
            `;
            
            overlay.classList.remove("hidden");
        }

        function loadingSpinner() {

            overlay.classList.remove("hidden");

            recipeContent.innerHTML = 
            `<div class="spinner"></div>
            <p>Loading your favourite dish</p>
            `;
        }

        function showError(message) {
            overlay.classList.remove("hidden");

            recipeContent.innerHTML = `<p class="error">${message}</p>`;
        }

        async function fetchRecipe(recipeName) {
            const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${recipeName}`;

            const response  = await fetch(url);

            if (!response.ok) throw new Error('Request failed');

            const data = await response.json();

            if (!data.meals || data.meals.length === 0) {
                throw new Error(`Couldn't find a recipe named "${recipeName}". Please try another name.`);
            }
            return data.meals[0];
        }

        async function handleSearch(recipeName) {
            loadingSpinner();
            searchButton.disabled = true;
            try {
                const recipe = await fetchRecipe(recipeName);
                showRecipe(recipe);
            } catch (err) {
                showError(err.message || 'Something went wrong. Please try again.');
            } finally {
                searchButton.disabled = false;
            }
        }
        searchButton.addEventListener("click", (e) => {
            e.preventDefault();
            const recipeName = searchInput.value.trim();
            if (recipeName === "") {
                showError("Please enter a recipe name.");
                return;
            }
            handleSearch(recipeName);
        });
        


    </script>
</body>
</html>
